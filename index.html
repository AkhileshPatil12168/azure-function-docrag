<!DOCTYPE html>
<html>
<head>
  <title>AI SharePoint Assistant</title>
  <style>
    body { font-family: Arial; background:#f3f4f6; padding:20px; }
    .card { background:white; padding:20px; margin:10px 0; border-radius:10px; }
    button { padding:10px; background:#4f46e5; color:white; border:none; border-radius:5px; cursor:pointer; }
    button:disabled { background:#999; cursor:not-allowed; }
    select,input { width:100%; padding:8px; margin:5px 0; }
    iframe { width:100%; height:400px; border:1px solid #ddd; }
    .loader { display:none; color:#4f46e5; }
  </style>
</head>

<body>

<h2>AI SharePoint Assistant</h2>

<div class="card">
  <h3>Select Site</h3>
  <p id="siteLoader" class="loader">Loading sites...</p>
  <select id="sites" onchange="onSiteChange()"></select>
</div>

<div class="card">
  <h3>Select Drive</h3>
  <p id="driveLoader" class="loader">Loading drives...</p>
  <select id="drives" onchange="onDriveChange()" disabled></select>
</div>

<div class="card">
  <h3>Select File</h3>
  <p id="fileLoader" class="loader">Loading files...</p>
  <select id="files" onchange="preview()" disabled></select>
</div>

<div class="card">
  <h3>Preview (PDF only)</h3>
  <iframe id="viewer"></iframe>
</div>

<div class="card">
  <button id="processBtn" onclick="process()" disabled>Process File</button>
  <p id="processLoader" class="loader">Processing file...</p>
  <p id="status"></p>
</div>

<div class="card">
  <input id="question" placeholder="Ask question"/>
  <button onclick="ask()">Ask</button>
  <p id="askLoader" class="loader">Generating answer...</p>
  <p id="answer"></p>
</div>

<script>

let url = window.location.origin;

// LOAD SITES
async function loadSites() {
  toggle("siteLoader", true);

  const res = await fetch(`${url}/api/sharepoint/ui/sites`);
  const data = await res.json();

  const select = document.getElementById("sites");
  select.innerHTML = "<option value=''>Select site</option>";

  data.sites.forEach(s => {
    select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
  });

  toggle("siteLoader", false);
}

// SITE CHANGE
function onSiteChange() {
  const siteId = document.getElementById("sites").value;

  reset("drives");
  reset("files");
  clearPreview();

  if (!siteId) return;

  loadDrives(siteId);
}

// LOAD DRIVES
async function loadDrives(siteId) {
  toggle("driveLoader", true);

  const res = await fetch(`${url}/api/sharepoint/ui/drives?site_id=${encodeURIComponent(siteId)}`);
  const data = await res.json();

  const select = document.getElementById("drives");
  select.disabled = false;
  select.innerHTML = "<option value=''>Select drive</option>";

  data.drives.forEach(d => {
    select.innerHTML += `<option value="${d.id}">${d.name}</option>`;
  });

  toggle("driveLoader", false);
}

// DRIVE CHANGE
function onDriveChange() {
  const driveId = document.getElementById("drives").value;

  reset("files");
  clearPreview();

  if (!driveId) return;

  loadFiles(driveId);
}

// LOAD FILES
async function loadFiles(driveId) {
  toggle("fileLoader", true);

  const res = await fetch(`${url}/api/sharepoint/ui/files?drive_id=${encodeURIComponent(driveId)}`);
  const data = await res.json();

  const select = document.getElementById("files");
  select.disabled = false;
  select.innerHTML = "<option value=''>Select file</option>";

  data.files.forEach(f => {
    select.innerHTML += `<option value="${f.id}">${f.name}</option>`;
  });

  toggle("fileLoader", false);
}

// PREVIEW (PDF ONLY)
function preview() {
  const driveId = document.getElementById("drives").value;
  const itemId = document.getElementById("files").value;
  const fileName = document.getElementById("files").selectedOptions[0]?.text || "";

  if (!itemId) return;

  if (fileName.toLowerCase().endsWith(".pdf")) {
    document.getElementById("viewer").src =
      `${url}/api/sharepoint/preview?drive_id=${driveId}&item_id=${itemId}`;
  } else {
    document.getElementById("viewer").src = "";
  }

  document.getElementById("processBtn").disabled = false;
}

// PROCESS FILE
async function process() {
  toggle("processLoader", true);

  const driveId = document.getElementById("drives").value;
  const itemId = document.getElementById("files").value;

  const res = await fetch(`${url}/api/sharepoint/process`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ drive_id: driveId, item_id: itemId })
  });

  const data = await res.json();
  document.getElementById("status").innerText = data.message || "Done";

  toggle("processLoader", false);
}

// ASK
async function ask() {
  toggle("askLoader", true);

  const q = document.getElementById("question").value;

  const res = await fetch(`${url}/api/sharepoint/ask`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({question:q})
  });

  const data = await res.json();
  document.getElementById("answer").innerText = data.answer || "No answer";

  toggle("askLoader", false);
}

// UTIL
function toggle(id, show) {
  document.getElementById(id).style.display = show ? "block" : "none";
}

function reset(id) {
  const el = document.getElementById(id);
  el.innerHTML = "<option value=''>Select</option>";
  el.disabled = true;
}

function clearPreview() {
  document.getElementById("viewer").src = "";
  document.getElementById("processBtn").disabled = true;
}

// INIT
loadSites();

</script>

</body>
</html>
